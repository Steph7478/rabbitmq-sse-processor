services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-test-prod-jvm
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_prod_jvm_data:/var/lib/rabbitmq
    networks:
      - prod-jvm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../../..
      dockerfile: docker/prod/jvm/Dockerfile
    container_name: rabbitmq-test-app-prod-jvm
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_RABBITMQ_HOST=rabbitmq
      - QUARKUS_RABBITMQ_PORT=5672
      - QUARKUS_RABBITMQ_USERNAME=guest
      - QUARKUS_RABBITMQ_PASSWORD=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - prod-jvm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  prod-jvm-network:
    driver: bridge

volumes:
  rabbitmq_prod_jvm_data: