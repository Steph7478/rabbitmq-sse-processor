version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-test-dev
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_dev_data:/var/lib/rabbitmq
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    container_name: rabbitmq-test-app-dev
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      - QUARKUS_RABBITMQ_HOST=rabbitmq
      - QUARKUS_RABBITMQ_PORT=5672
      - QUARKUS_RABBITMQ_USERNAME=guest
      - QUARKUS_RABBITMQ_PASSWORD=guest
      - JAVA_OPTS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    volumes:
      - ../../src:/app/src
      - ../../pom.xml:/app/pom.xml
      - ~/.m2:/root/.m2
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  rabbitmq_dev_data: