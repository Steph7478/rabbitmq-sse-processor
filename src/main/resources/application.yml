quarkus:
  rabbitmq:
    host: ${QUARKUS_RABBITMQ_HOST:localhost}
    port: ${QUARKUS_RABBITMQ_PORT:5672}
    username: ${QUARKUS_RABBITMQ_USERNAME:guest}
    password: ${QUARKUS_RABBITMQ_PASSWORD:guest}
    
  http:
    sse:
      heartbeat:
        enabled: true
        interval: 60s
        
  micrometer:
    enabled: true
    export:
      json:
        enabled: true
    binder:
      system-cpu:
        enabled: true
      jvm:
        enabled: true
        
  thread-pool:
    max-threads: 8
    core-threads: 2
    queue-size: 20

mp:
  messaging:
    incoming:
      consumer:
        connector: smallrye-rabbitmq
        host: ${QUARKUS_RABBITMQ_HOST:localhost}
        port: ${QUARKUS_RABBITMQ_PORT:5672}
        username: ${QUARKUS_RABBITMQ_USERNAME:guest}
        password: ${QUARKUS_RABBITMQ_PASSWORD:guest}
        exchange:
          name: processing.exchange
          type: direct
        queue:
          name: processing.queue
        routing-keys:
          - processing.key
        max-inflight-messages: 5
        auto-acknowledgment: true
    outgoing:
      producer:
        connector: smallrye-rabbitmq
        host: ${QUARKUS_RABBITMQ_HOST:localhost}
        port: ${QUARKUS_RABBITMQ_PORT:5672}
        username: ${QUARKUS_RABBITMQ_USERNAME:guest}
        password: ${QUARKUS_RABBITMQ_PASSWORD:guest}
        exchange:
          name: processing.exchange
          type: direct
        default-routing-key: processing.key
        delivery-mode: persistent

app:
  processing:
    base-time: 500
    standard-deviation: 100
    types:
      - name: prime-calculation
        cpu-load: 100000
        io-time: 100
      - name: aes-encryption
        cpu-load: 500000
        io-time: 50
      - name: gzip-compression
        cpu-load: 200000
        io-time: 200
    limits:
      max-requests-per-second: 20
      max-sse-connections: 50
      queue-max-size: 500