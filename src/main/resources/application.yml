quarkus:
  redis:
    hosts: redis://localhost:6379
    timeout: 5s               
    max-pool-size: 3             
    max-pool-waiting: 2       
    
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    
  smallrye-messaging:
    incoming:
      consumer:
        connector: smallrye-rabbitmq
        queue:
          name: processing.queue
          declaration:
            arguments:
              x-message-ttl: 30000   
              x-expires: 60000       
        exchange:
          name: processing.exchange
          type: direct
        routing-keys:
          - processing.key
        max-inflight-messages: 5        
        auto-acknowledgments: false   
        consumer:
          arguments:
            x-priority: 5
          
    outgoing:
      producer:
        connector: smallrye-rabbitmq
        exchange:
          name: processing.exchange
          type: direct
        default-routing-key: processing.key
        ttl: 15000
        delivery-mode: persistent

  http:
    sse:
      heartbeat:
        enabled: true
        interval: 60s
        
  micrometer:
    enabled: true
    export:
      json:
        enabled: true
    binder:
      system-cpu:
        enabled: true
      jvm:
        enabled: true
        
  thread-pool:
    max-threads: 8
    core-threads: 2
    queue-size: 20
    growth-resistance: 2

app:
  processing:
    base-time: 500
    standard-deviation: 100
    types:
      - name: prime-calculation
        cpu-load: 100000
        io-time: 100
      - name: aes-encryption
        cpu-load: 500000
        io-time: 50
      - name: gzip-compression
        cpu-load: 200000
        io-time: 200
    limits:
      max-requests-per-second: 20
      max-sse-connections: 50
      queue-max-size: 500